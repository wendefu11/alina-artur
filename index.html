<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a0b1a">
  <meta name="description" content="Алина и Артур — приватный игровой кабинет для двоих. Игры, статистика, дневник любви.">
  <title>Алина · Артур — Private Lounge</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Inter:wght@400;500;600;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>💞</text></svg>">
</head>
<body class="theme-aurora">

  <div id="aurora" class="aurora" aria-hidden="true">
    <span class="aurora-blob a1"></span>
    <span class="aurora-blob a2"></span>
    <span class="aurora-blob a3"></span>
    <span class="aurora-blob a4"></span>
    <div class="aurora-grain"></div>
  </div>

  <canvas id="hearts" class="hearts-layer" aria-hidden="true"></canvas>

  <!-- Login Screen -->
  <section id="loginScreen" class="login-screen">
    <div class="login-inner">
      <div class="login-brand">
        <span class="brand-mark">A&amp;A</span>
        <div class="brand-text">
          <small>Private Lounge · 2026</small>
          <h1>Только для двоих<span class="cursor-blink">|</span></h1>
          <p>Выбери, кто заходит. Сайт запомнит профиль на этом устройстве и встретит тебя в следующий раз.</p>
        </div>
      </div>

      <div class="login-cards">
        <button class="login-card login-card--alina" data-login="Алина">
          <div class="login-card-bg"></div>
          <div class="login-card-inner">
            <span class="login-avatar">А</span>
            <h2>Алина</h2>
            <p>Королева красоты, побед и капризов</p>
            <span class="login-enter">Войти <span class="arrow">→</span></span>
          </div>
        </button>
        <button class="login-card login-card--artur" data-login="Артур">
          <div class="login-card-bg"></div>
          <div class="login-card-inner">
            <span class="login-avatar">А</span>
            <h2>Артур</h2>
            <p>Герой камбэков, романтик и стратег</p>
            <span class="login-enter">Войти <span class="arrow">→</span></span>
          </div>
        </button>
      </div>

      <div class="login-foot">
        <span class="dot"></span>
        <span>Сохраняется только в твоём браузере. Никаких серверов, никаких слежек.</span>
      </div>
    </div>
  </section>

  <!-- Main App -->
  <main id="app" class="app hidden">
    <aside class="sidebar">
      <button class="brand" data-route="home">
        <span class="brand-mark">A&amp;A</span>
        <div>
          <strong>Алина · Артур</strong>
          <small>Private Lounge</small>
        </div>
      </button>

      <nav class="nav">
        <button class="nav-item" data-route="home"><span class="nav-ico">✦</span><span>Главная</span></button>
        <button class="nav-item" data-route="games"><span class="nav-ico">◆</span><span>Игры</span></button>
        <button class="nav-item" data-route="journal"><span class="nav-ico">♡</span><span>Дневник</span></button>
        <button class="nav-item" data-route="stats"><span class="nav-ico">▲</span><span>Статистика</span></button>
        <button class="nav-item" data-route="settings"><span class="nav-ico">⚙</span><span>Настройки</span></button>
      </nav>

      <div class="sidebar-foot">
        <button class="me-chip" id="meChip">
          <span class="me-avatar" id="meAvatar">А</span>
          <div>
            <small>Сейчас в кабинете</small>
            <strong id="meName">—</strong>
          </div>
          <span class="me-arrow">⇄</span>
        </button>
      </div>
    </aside>

    <div class="content">
      <header class="topbar">
        <div class="crumb">
          <span id="crumbTitle">Главная</span>
          <small id="crumbSub">Добро пожаловать</small>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" id="themeBtn" title="Сменить тему">◐</button>
          <button class="icon-btn" id="muteBtn" title="Звук">♪</button>
          <button class="icon-btn icon-btn--accent" id="surpriseBtn" title="Сюрприз">✦</button>
        </div>
      </header>

      <div id="view" class="view"></div>
    </div>
  </main>

  <!-- Templates rendered dynamically by app.js -->
  <div id="toast" class="toast hidden"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
